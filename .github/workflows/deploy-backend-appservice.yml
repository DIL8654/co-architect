name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-appservice.yml'
      - 'DEPLOYMENT.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish API
        run: dotnet publish backend/src/api/CoArchitect.Api/CoArchitect.Api.csproj -c Release -o backend/publish

      - name: Package API output
        run: |
          cd backend/publish
          zip -r ../api.zip .

      - name: Azure login (service principal)
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" >/dev/null
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Validate App Service target
        run: |
          az webapp show \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "defaultHostName" -o tsv >/dev/null

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --src-path backend/api.zip \
            --type zip
