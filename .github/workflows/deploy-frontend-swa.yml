name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'web/**'
      - '.github/workflows/deploy-frontend-swa.yml'
      - 'DEPLOYMENT.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Create temporary frontend env for build
        run: |
          printf "VITE_API_BASE_URL=%s\n" "${{ secrets.VITE_API_BASE_URL_PROD }}" > backend/.env
          printf "VITE_APP_ENV=production\n" >> backend/.env

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: web/dist
          output_location: ''
          api_location: ''
          skip_app_build: true

      - name: Cleanup temporary frontend env
        if: always()
        run: rm -f backend/.env
